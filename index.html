<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Minecraft Portal en el Campo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.6" position="-1 1 2"></a-light>

    <a-entity position="0 0 -5">
      
      <a-box position="0 0.5 0" width="4" height="1" depth="1" color="#1a0a2e"></a-box>
      <a-box position="0 4.5 0" width="4" height="1" depth="1" color="#1a0a2e"></a-box>
      <a-box position="-1.5 2.5 0" width="1" height="3" depth="1" color="#1a0a2e"></a-box>
      <a-box position="1.5 2.5 0" width="1" height="3" depth="1" color="#1a0a2e"></a-box>

      <a-box position="0 2.5 0" width="2" height="3" depth="0.1" 
             color="#9e26cf" 
             material="opacity: 0.8; transparent: true; emissive: #6a1b9a; emissiveIntensity: 0.5"
             animation="property: material.opacity; from: 0.5; to: 0.9; dir: alternate; dur: 1200; loop: true">
      </a-box>
    </a-entity>

    <a-plane rotation="-90 0 0" width="50" height="50" color="#7BC8A4"></a-plane>

    <a-sky color="#9ee1f0"></a-sky>

  </a-scene>
</body>
</html>
