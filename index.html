<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Minecraft Nether Portal - Step 1</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-light type="ambient" color="#444"></a-light>
    <a-light type="point" intensity="2" distance="10" position="0 2 -2" color="#9e26cf"></a-light>

    <a-entity position="0 0 -5">
      
      <a-box position="0 0.5 0" width="4" height="1" depth="1" color="#130919"></a-box>
      <a-box position="0 4.5 0" width="4" height="1" depth="1" color="#130919"></a-box>
      <a-box position="-1.5 2.5 0" width="1" height="3" depth="1" color="#130919"></a-box>
      <a-box position="1.5 2.5 0" width="1" height="3" depth="1" color="#130919"></a-box>

      <a-box position="0 2.5 0" width="2" height="3" depth="0.1" 
             color="#9e26cf" 
             material="opacity: 0.7; transparent: true; emissive: #9e26cf; emissiveIntensity: 1"
             animation="property: material.opacity; from: 0.4; to: 0.8; dir: alternate; dur: 1000; loop: true">
      </a-box>
      
      <a-sphere position="0 2.5 0" radius="0.05" color="#ff00ff"
                animation="property: position; from: -0.5 1 0.2; to: 0.5 4 0.2; dur: 2000; loop: true">
      </a-sphere>
    </a-entity>

    <a-plane rotation="-90 0 0" width="20" height="20" color="#222" metalness="0.2"></a-plane>

    <a-sky color="#050505"></a-sky>
  </a-scene>
</body>
</html>
