<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Minecraft Nether Portal & Tree Scene</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="crying-obsidian-texture" src="image.png"> <img id="grass-texture" src="image_1.jpg">           <img id="portal-texture" src="image_2.jpg">         <a-asset-item id="model" src="minecraft_tree.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.6" position="-1 1 2"></a-light>
    <a-light type="point" intensity="0.4" distance="10" position="0 2 -2" color="#9e26cf"></a-light>
      
      <a-box position="0 0.5 0" width="4" height="1" depth="1" material="src: #crying-obsidian-texture; repeat: 4 1"></a-box>
      <a-box position="0 4.5 0" width="4" height="1" depth="1" material="src: #crying-obsidian-texture; repeat: 4 1"></a-box>
      <a-box position="-1.5 2.5 0" width="1" height="3" depth="1" material="src: #crying-obsidian-texture; repeat: 1 3"></a-box>
      <a-box position="1.5 2.5 0" width="1" height="3" depth="1" material="src: #crying-obsidian-texture; repeat: 1 3"></a-box>

      <a-box position="0 2.5 0" width="2" height="3" depth="0.1" 
             material="src: #portal-texture; repeat: 1 1; opacity: 0.8; transparent: true; emissive: #9e26cf; emissiveIntensity: 0.5"
             animation="property: material.opacity; from: 0.5; to: 0.9; dir: alternate; dur: 1200; loop: true">
      </a-box>
    </a-entity>

    <a-plane rotation="-90 0 0" width="100" height="100" material="src: #grass-texture; repeat: 100 100"></a-plane>

    <a-sky src="minecraft.jpg" rotation="0 -90 0"></a-sky>

    <a-assets>
  <a-asset-item id="model" src="minecraft_tree.glb"></a-asset-item>
</a-assets>

<a-entity gltf-model="#model" position="-12 -5 -6" scale="10 10 10"></a-entity>

    <a-entity camera look-controls position="0 1.6 0"></a-entity>

  </a-scene>
</body>
</html>
